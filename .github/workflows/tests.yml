name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  generate-matrix:
    name: Generate Laravel Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}

    steps:
      - uses: actions/checkout@v4

      - id: matrix
        run: |
          versions=$(jq -r '.require["illuminate/database"]' composer.json)

          laravel_versions=$(echo "$versions" \
            | jq -R 'split("|") | map(gsub("[^0-9.]";"") | split(".")[0] | tonumber) | .[]')

          json='{"include":['

          for v in $laravel_versions; do
            tb=$((v-2))

            # PHP compatibility rules
            if [ "$v" -ge 13 ]; then
              phps="8.3 8.4"
            else
              phps="8.2 8.3 8.4"
            fi

            for php in $phps; do
              for dep in prefer-stable prefer-lowest; do
                json="$json{\"laravel\":$v,\"testbench\":$tb,\"php\":\"$php\",\"dependency-version\":\"$dep\"},"
              done
            done
          done

          json="${json%,}]}"
          echo "matrix=$json" >> $GITHUB_OUTPUT

  tests:
    needs: generate-matrix
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.2','8.3','8.4']
        dependency-version: [prefer-stable, prefer-lowest]
        include: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}

  - name: Print matrix
    run: echo '${{ needs.generate-matrix.outputs.matrix }}'

    name: Laravel ${{ matrix.laravel }} / PHP ${{ matrix.php }} / ${{ matrix.dependency-version }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Determine Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ matrix.php }}-${{ matrix.dependency-version }}-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            ${{ runner.os }}-composer-${{ matrix.php }}-

      - name: Install Testbench
        run: composer require orchestra/testbench:^${{ matrix.testbench }}.0 --no-interaction --no-update

      - name: Install dependencies
        run: composer update --${{ matrix.dependency-version }} --prefer-dist --no-interaction --no-progress

      - name: Run tests
        run: composer test